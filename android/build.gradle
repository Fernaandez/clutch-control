// Top-level build file where you can add configuration options common to all sub-projects/modules.

// Fix for @capacitor-community/background-geolocation proguard error
def bgGeolocationBuildGradle = file('../node_modules/@capacitor-community/background-geolocation/android/build.gradle')
if (bgGeolocationBuildGradle.exists()) {
    def content = bgGeolocationBuildGradle.text
    if (content.contains("'proguard-android.txt'")) {
        bgGeolocationBuildGradle.text = content.replace("'proguard-android.txt'", "'proguard-android-optimize.txt'")
    }
}

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.0.1'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
